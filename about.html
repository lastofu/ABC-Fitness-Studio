<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABC Fitness Studio | About Us</title>
</head>
<body>
    <header>
        <nav></nav>
    </header>

    <main>
        <section>
            <h2>About Our Studio</h2>
            <p>ABC Fitness is a local haven for physical and mental wellness. 
                We provide a welcoming space for your fitness journey and our gaol is to make everyone feel welcome.</p>
        </section>

        <section>
            <h2>Contact Us / Book a Class</h2>
            <form>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="interest">Interested In:</label><br>
                <select id="interest" name="interest">
                    <option value="yoga">Yoga</option>
                    <option value="pilates">Pilates</option>
                    <option value="zumba">Zumba</option>
                </select><br><br>

                <button type="submit">Submit Inquiry</button>
            </form>
        </section>
    </main>
</body>
</html>
